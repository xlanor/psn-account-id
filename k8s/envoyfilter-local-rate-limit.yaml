apiVersion: networking.istio.io/v1alpha3
kind: EnvoyFilter
metadata:
  name: psn-account-lookup-api-local-rate-limit
spec:
  workloadSelector:
    labels:
      app: istio-ingressgateway
  configPatches:
    - applyTo: HTTP_FILTER
      match:
        context: GATEWAY
        listener:
          filterChain:
            filter:
              name: envoy.filters.network.http_connection_manager
              subFilter:
                name: envoy.filters.http.router
      patch:
        operation: INSERT_BEFORE
        value:
          name: envoy.filters.http.local_ratelimit
          typed_config:
            "@type": type.googleapis.com/udpa.type.v1.TypedStruct
            type_url: type.googleapis.com/envoy.extensions.filters.http.local_ratelimit.v3.LocalRateLimit
            value:
              stat_prefix: psn_api_ingress_local_rate_limit
    - applyTo: HTTP_ROUTE
      match:
        context: GATEWAY
        routeConfiguration:
          vhost:
            # Adjust this to match the gateway virtual host generated in your cluster.
            # Common values are api.example.com:80 or api.example.com:443.
            name: api.example.com:80
            route:
              name: account-id-lookup
      patch:
        operation: MERGE
        value:
          typed_per_filter_config:
            envoy.filters.http.local_ratelimit:
              "@type": type.googleapis.com/udpa.type.v1.TypedStruct
              type_url: type.googleapis.com/envoy.extensions.filters.http.local_ratelimit.v3.LocalRateLimit
              value:
                stat_prefix: psn_api_account_id_lookup
                token_bucket:
                  max_tokens: 120
                  tokens_per_fill: 120
                  fill_interval: 60s
                filter_enabled:
                  runtime_key: psn_api_account_id_lookup_enabled
                  default_value:
                    numerator: 100
                    denominator: HUNDRED
                filter_enforced:
                  runtime_key: psn_api_account_id_lookup_enforced
                  default_value:
                    numerator: 100
                    denominator: HUNDRED
                response_headers_to_add:
                  - append: false
                    header:
                      key: x-istio-local-rate-limit
                      value: "true"
